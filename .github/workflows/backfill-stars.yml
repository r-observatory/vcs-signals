name: backfill-stars
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: vcs-signals-backfill
  cancel-in-progress: false
env:
  TZ: UTC
jobs:
  backfill:
    runs-on: ubuntu-latest
    # Each stargazer page costs 1 GraphQL point, so one token is capped near the
    # 5000-points/hour primary budget (~1.4 requests/second). The whole roster is
    # ~16k pages, so the reconstruct step runs a few hours serially; parallel
    # sharding on a single token would only exhaust the shared budget faster.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RSQLite
            any::jsonlite
            any::testthat
      - name: Run tests
        run: Rscript tests/testthat.R
      - name: Ensure current release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view current --repo ${{ github.repository }} >/dev/null 2>&1 \
            || gh release create current --repo ${{ github.repository }} \
                 --title "vcs-signals (rolling)" \
                 --notes "Rolling data release, updated daily." --latest
      - name: Enumerate roster
        env:
          VCS_SIGNALS_TOKEN: ${{ secrets.VCS_SIGNALS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCS_OUT: out
        run: Rscript scripts/backfill.R enumerate
      - name: Reconstruct star history
        env:
          VCS_SIGNALS_TOKEN: ${{ secrets.VCS_SIGNALS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCS_OUT: out
          VCS_ROSTER: out
          VCS_SHARD_I: "0"
          VCS_SHARD_N: "1"
        run: Rscript scripts/backfill.R fetch
      - name: Merge and publish
        env:
          VCS_SIGNALS_TOKEN: ${{ secrets.VCS_SIGNALS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VCS_OUT: out
          VCS_PARTS: out
        run: Rscript scripts/backfill.R merge
